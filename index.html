<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFlex</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
#mainApp{display:none;}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="loginPage" class="center">
  <h1>💪 Welcome to FitFlex</h1>
  <button onclick="startApp()" class="btn">Start</button>
</div>

<!-- MAIN APP -->
<div id="mainApp">

<header class="app-header">
  <h2>FitFlex</h2>
  <button id="themeToggle" class="btn">🌗</button>
</header>

<!-- TABS -->
<nav class="tabs">
  <button class="tab active" data-target="#dashboard">Dashboard</button>
  <button class="tab" data-target="#workouts">Workouts</button>
  <button class="tab" data-target="#progress">Progress</button>
  <button class="tab" data-target="#planner">BMI</button>
</nav>

<main>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">
  <div class="card">
    <h3>Stats</h3>
    <p>Workouts: <span id="statWorkouts">0</span></p>
    <p>Calories: <span id="statCalories">0</span></p>
  </div>
</section>

<!-- WORKOUTS -->
<section id="workouts" class="page">
  <div class="card">
    <h3>Workout Library</h3>
    <div id="workoutGrid" class="grid"></div>
  </div>
</section>

<!-- PROGRESS -->
<section id="progress" class="page">
  <div class="card">
    <h3>Weekly Progress</h3>
    <canvas id="weekChart"></canvas>
  </div>

  <div class="card">
    <h3>History</h3>
    <ul id="historyList"></ul>
  </div>
</section>

<!-- BMI -->
<section id="planner" class="page">
  <div class="card">
    <h3>Calculate BMI</h3>
    <input id="height" type="number" placeholder="Height (cm)">
    <input id="weight" type="number" placeholder="Weight (kg)">
    <button id="calcBMI" class="btn">Calculate</button>
    <p id="bmiResult"></p>
  </div>
</section>

</main>

</div>

<script src="app.js"></script>

<script>
function startApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("mainApp").style.display="block";
}
</script>

</body>
</html>
