<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFlex</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
#mainApp{display:none;}
</style>
</head>

<body>

<!-- SIMPLE START SCREEN -->
<div id="loginPage" style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
  <h1>💪 Welcome to FitFlex</h1>
  <button onclick="startApp()" class="btn">Start</button>
</div>

<!-- MAIN APP -->
<div id="mainApp">

<header class="app-header">
  <h2>FitFlex</h2>
  <button id="themeToggle">🌗</button>
</header>

<nav class="tabs">
  <button class="tab active" data-target="#dashboard">Dashboard</button>
  <button class="tab" data-target="#workouts">Workouts</button>
  <button class="tab" data-target="#progress">Progress</button>
  <button class="tab" data-target="#planner">BMI</button>
</nav>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">
  <h3>Stats</h3>
  <p>Workouts: <span id="statWorkouts">0</span></p>
  <p>Calories: <span id="statCalories">0</span></p>
</section>

<!-- WORKOUTS -->
<section id="workouts" class="page">
  <div id="workoutGrid"></div>
</section>

<!-- PROGRESS -->
<section id="progress" class="page">
  <canvas id="weekChart"></canvas>
  <ul id="historyList"></ul>
</section>

<!-- BMI -->
<section id="planner" class="page">
  <input id="height" placeholder="Height cm">
  <input id="weight" placeholder="Weight kg">
  <button id="calcBMI">Calculate</button>
  <p id="bmiResult"></p>
</section>

</div>

<script src="app.js"></script>

<script>
function startApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("mainApp").style.display="block";
}
</script>

</body>
</html>
